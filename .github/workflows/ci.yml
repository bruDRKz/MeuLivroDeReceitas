name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Pega o código do GitHub
      - uses: actions/checkout@v4

      # 2️⃣ Configura o .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0' # ou a versão que seu projeto usa

      # 3️⃣ Restaura dependências
      - name: Restore dependencies
        run: dotnet restore

      # 4️⃣ Build do projeto
      - name: Build
        run: dotnet build --no-restore

      # 5️⃣ Executa testes
      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      # 6️⃣ SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=bruDRKz_MeuLivroDeReceitas
            -Dsonar.organization=brudrkz
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}