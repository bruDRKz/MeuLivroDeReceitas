name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout do código
      - uses: actions/checkout@v4

      # 2️⃣ Configura .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0' # ajuste se necessário

      # 3️⃣ Restaura dependências usando a solução na raiz
      - name: Restore dependencies
        run: dotnet restore MeuLivroDeReceitas.sln

      # 4️⃣ Build
      - name: Build
        run: dotnet build MeuLivroDeReceitas.sln --no-restore

      # 5️⃣ Executa testes
      - name: Run tests
        run: dotnet test MeuLivroDeReceitas.sln --no-build --verbosity normal

      # 6️⃣ SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=bruDRKz_MeuLivroDeReceitas
            -Dsonar.organization=brudrkz
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}